name: TaskApp CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: fantoforever
  AWS_REGION: us-east-1

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./taskapp_frontend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/taskapp-frontend:latest, ${{ env.DOCKER_REGISTRY }}/taskapp-frontend:${{ github.sha }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./taskapp_backend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/taskapp-backend:latest, ${{ env.DOCKER_REGISTRY }}/taskapp-backend:${{ github.sha }}

      - name: Basic Tests
        run: |
          echo "Running unit tests..."
          echo "Tests passed successfully!"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Kubernetes
        env:
          KOPS_STATE_STORE: ${{ secrets.KOPS_STATE_STORE }}
          NAME: taskapp.fantoforever.com
        run: |
          # Install kops
          curl -Lo kops https://github.com/kubernetes/kops/releases/download/$(curl -s https://api.github.com/repos/kubernetes/kops/releases/latest | grep tag_name | cut -d '"' -f 4)/kops-linux-amd64
          chmod +x kops
          sudo mv kops /usr/local/bin/kops
          
          # Export kubeconfig
          kops export kubeconfig --admin --name ${NAME} --state ${KOPS_STATE_STORE}
          
          # Deploy manifests
          kubectl apply -f k8s/
          kubectl apply -f k8s/monitoring/
