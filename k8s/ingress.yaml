apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Cert-manager specific annotations to automatically request SSL certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - taskapp.fantoforever.com
    secretName: taskapp-tls-secret
  rules:
  - host: taskapp.fantoforever.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: taskapp-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: taskapp-frontend
            port:
              number: 80
