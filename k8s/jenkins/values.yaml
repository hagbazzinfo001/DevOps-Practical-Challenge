# Helm values for Jenkins (jenkins/jenkins)
controller:
  componentName: "jenkins-controller"
  image:
    registry: "docker.io"
    repository: "jenkins/jenkins"
    tag: "lts"
  admin:
    username: "admin"
    password: "admin_password" # Change this in production or use secrets
  serviceType: LoadBalancer
  installPlugins:
    - kubernetes
    - workflow-job
    - workflow-aggregator
    - credentials-binding
    - git
    - docker-workflow
persistence:
  enabled: true
  storageClass: "gp2" # Or gp3 if configured in your cluster
  size: "8Gi"
  accessMode: "ReadWriteOnce"
agent:
  enabled: true
serviceAccount:
  create: true
  name: "jenkins"
rbac:
  create: true
